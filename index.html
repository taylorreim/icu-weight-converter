<div class="container">
  <h1>ICU Weight Converter</h1>
  <p class="subtitle">Convert lbs to kg for drug dosing</P>

<label>Patient Weight (lbs)</label>
<input type="number" id="weightInput" Placeholder="Enter Weight in Lbs">
<button onclick="convert()">Calculate</button>
<div class="result" id="result">Result will appear here</div>
</div>

<hr class="divider">

<h2>Drip Rate Calculator</h2>
<p class="subtitle">Calculate infusion rate in ml/hr</p>

<label>Drug dose ordered (mcg/kg/min)</label>
<input type="number" id="doseInput" placeholder="Enter dose">

<label>Patient Weight (kg)</label>
<input type="number" id="weightKgInput" placeholder="Enter weight in kg">

<label>Drug concentration (mcg/ml)</label>
<input type="number" id="concentrationInput" placeholder="Enter concentration">

<button onclick="calculateDrip()">Calculate drip rate</button>
<div class="result" id="dripResult">Result will appear here</div>
